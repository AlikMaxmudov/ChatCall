<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatCall — переписка и звонки</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');

        .tail-container * { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }

        .chat-bubble {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 20px;
            position: relative;
        }
        .chat-bubble-self {
            border-bottom-right-radius: 4px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: white;
        }
        .chat-bubble-other {
            border-bottom-left-radius: 4px;
            background: #1f2937;
            color: white;
        }
        .online-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* Screen share video */
        #remote-video-container {
            display: none;
            position: fixed;
            bottom: 80px;
            right: 6px;
            z-index: 10001;
            background: #000;
            border: 2px solid #00d4ff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            resize: both;
            min-width: 320px;
            min-height: 180px;
        }
        #remote-video-container.active { display: block; }
        #remote-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background: #000;
        }
        #remote-video-label {
            position: absolute;
            top: 8px;
            left: 12px;
            font-size: 12px;
            color: #00d4ff;
            font-weight: 600;
            pointer-events: none;
        }
        #remote-video-close {
            position: absolute;
            top: 6px;
            right: 10px;
            cursor: pointer;
            color: #fff;
            font-size: 16px;
            line-height: 1;
            z-index: 10;
        }

        /* Local screen preview (pip) */
        #local-screen-preview {
            display: none;
            position: fixed;
            bottom: 80px;
            left: 6px;
            z-index: 10001;
            background: #000;
            border: 2px solid #a855f7;
            border-radius: 12px;
            overflow: hidden;
            width: 240px;
        }
        #local-screen-preview.active { display: block; }
        #local-screen-video {
            width: 100%;
            display: block;
            background: #000;
        }
        #local-screen-label {
            position: absolute;
            top: 6px;
            left: 8px;
            font-size: 11px;
            color: #a855f7;
            font-weight: 600;
        }
    </style>
</head>
<body class="tail-container bg-zinc-950 text-white min-h-screen flex flex-col">

<!-- HEADER -->
<header class="bg-zinc-900 border-b border-zinc-800 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-x-3">
        <div class="w-9 h-9 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-2xl flex items-center justify-center text-2xl">📞</div>
        <h1 class="logo-font text-3xl tracking-tighter">ChatCall</h1>
    </div>
    <div class="flex items-center gap-x-4">
        <div class="bg-zinc-800 text-cyan-400 px-4 py-1.5 rounded-3xl text-sm font-medium flex items-center gap-x-2">
            👤 <span id="current-username" class="font-mono"></span>
        </div>
        <button onclick="logout()"
                class="flex items-center gap-x-2 bg-red-500/10 hover:bg-red-500/20 text-red-400 px-5 py-2 rounded-3xl text-sm font-medium">
            Выйти
        </button>
    </div>
</header>

<div class="flex flex-1 overflow-hidden">
    <!-- SIDEBAR -->
    <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
        <div class="p-6 border-b border-zinc-800">
            <h2 class="uppercase text-xs font-semibold tracking-widest text-zinc-400 mb-3">Онлайн сейчас</h2>
            <div id="online-list" class="space-y-1"></div>
        </div>
        <div class="flex-1 p-4 text-xs text-zinc-500 flex items-center justify-center border-t border-zinc-800">
            Пригласи друга по ссылке<br>
            <span id="share-link" class="font-mono text-cyan-400 cursor-pointer" onclick="copyShareLink()"></span>
        </div>
    </div>

    <!-- MAIN CHAT AREA -->
    <div class="flex-1 flex flex-col">
        <div id="chat-header"
             class="bg-zinc-900 px-6 py-4 border-b border-zinc-800 flex items-center justify-between hidden">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-2xl flex items-center justify-center text-xl">👤</div>
                <div>
                    <div id="chat-with-name" class="font-semibold text-lg"></div>
                    <div class="text-emerald-400 text-sm flex items-center gap-x-1">
                        <span class="online-dot w-2 h-2 bg-emerald-400 rounded-full"></span> онлайн
                    </div>
                </div>
            </div>
            <div class="flex gap-x-2 flex-wrap">
                <button onclick="startAudioCall()"
                        class="flex items-center gap-x-2 bg-gradient-to-r from-cyan-400 to-blue-600 text-white px-5 py-2.5 rounded-3xl font-medium text-sm">
                    📞 Позвонить
                </button>
                <button onclick="startScreenShare()" id="screen-share-btn"
                        class="flex items-center gap-x-2 bg-purple-600 hover:bg-purple-700 text-white px-5 py-2.5 rounded-3xl font-medium text-sm">
                    🖥️ Экран
                </button>
                <button onclick="stopScreenShare()" id="stop-screen-btn"
                        class="hidden flex items-center gap-x-2 bg-orange-500 hover:bg-orange-600 text-white px-5 py-2.5 rounded-3xl font-medium text-sm">
                    ⏹ Стоп экран
                </button>
                <button onclick="endCall()" id="end-call-btn"
                        class="hidden bg-red-500 hover:bg-red-600 text-white px-5 py-2.5 rounded-3xl font-medium text-sm">
                    Завершить
                </button>
            </div>
        </div>

        <div id="chat-area" class="flex-1 p-6 overflow-y-auto flex flex-col gap-y-4 bg-zinc-950"></div>

        <div id="message-input-area" class="border-t border-zinc-800 bg-zinc-900 p-4 flex items-center gap-x-3 hidden">
            <input id="message-input" onkeydown="if(event.key === 'Enter') sendMessage()"
                   type="text" placeholder="Напиши сообщение..."
                   class="flex-1 bg-zinc-800 text-white placeholder-zinc-400 rounded-3xl px-6 py-4 focus:outline-none focus:ring-2 focus:ring-cyan-400">
            <button onclick="sendMessage()"
                    class="w-12 h-12 bg-cyan-400 hover:bg-cyan-300 rounded-3xl flex items-center justify-center">→</button>
        </div>

        <div id="empty-state" class="flex-1 flex flex-col items-center justify-center text-center px-10">
            <div class="text-8xl mb-6">👋</div>
            <h2 class="text-3xl font-semibold mb-2">Выбери собеседника</h2>
            <p class="text-zinc-400">Кто-то онлайн? Нажми на имя слева</p>
        </div>
    </div>
</div>

<!-- Incoming call modal -->
<div id="incoming-call-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999]">
    <div class="bg-zinc-900 rounded-3xl max-w-md w-full mx-4 p-8 text-center">
        <div class="text-7xl mb-6">📲</div>
        <h3 class="text-2xl font-semibold mb-1">Звонок от</h3>
        <p id="caller-name" class="text-cyan-400 text-3xl font-medium mb-8"></p>
        <div class="flex gap-x-4">
            <button onclick="declineCall()" class="flex-1 bg-red-500 hover:bg-red-600 py-5 rounded-3xl text-lg">Отклонить</button>
            <button onclick="acceptCall()" class="flex-1 bg-emerald-500 hover:bg-emerald-600 py-5 rounded-3xl text-lg">Принять</button>
        </div>
    </div>
</div>

<!-- Active call overlay -->
<div id="active-call-overlay"
     class="hidden fixed bottom-6 right-6 bg-zinc-900/95 backdrop-blur-xl border border-cyan-400 rounded-3xl px-6 py-4 shadow-2xl flex items-center gap-x-4 z-[10000]">
    <div class="flex items-center gap-x-3">
        <div class="w-3 h-3 bg-emerald-400 rounded-full animate-pulse"></div>
        <span id="call-with-name" class="font-semibold"></span>
    </div>
    <button onclick="endCall()" class="bg-red-500 text-white px-8 py-2 rounded-3xl text-sm font-medium">Завершить</button>
</div>

<!-- Remote video (screen share from other side) -->
<div id="remote-video-container">
    <span id="remote-video-label">🖥️ Экран собеседника</span>
    <span id="remote-video-close" onclick="closeRemoteVideo()">✕</span>
    <video id="remote-video" autoplay playsinline></video>
</div>

<!-- Local screen preview (PiP) -->
<div id="local-screen-preview">
    <span id="local-screen-label">Вы показываете экран</span>
    <video id="local-screen-video" autoplay playsinline muted></video>
</div>

<!-- Audio only -->
<audio id="remote-audio" autoplay playsinline></audio>

<script>
    let socket = null;
    let myUsername = '';
    let currentChatUser = null;
    let peerConnection = null;
    let localStream = null;          // mic audio stream
    let localScreenStream = null;    // screen capture stream
    let remoteAudioEl = null;
    let remoteVideoEl = null;
    let incomingOfferData = null;
    let incomingCaller = null;

    const config = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            {
                urls: 'turn:YOUR_PUBLIC_IP_OR_DOMAIN:3478',
                username: 'testuser',
                credential: 'testpass'
            }
        ]
    };

    // ==================== WEBSOCKET ====================
    function connectWebSocket(username) {
        const protocol = window.location.protocol === "https:" ? "wss" : "ws";
        socket = new WebSocket(`${protocol}://${window.location.host}/ws/${encodeURIComponent(username)}`);

        socket.onopen = () => {
            document.getElementById('current-username').textContent = username;
            document.getElementById('share-link').textContent = window.location.origin + '?join=' + username;
        };

        socket.onmessage = async (event) => {
            const data = JSON.parse(event.data);

            if (data.type === 'online') {
                renderOnlineList(data.users);
            } else if (data.type === 'chat' && data.from === currentChatUser) {
                addMessageToUI(data.from, data.message, false);
            } else if (data.type === 'offer') {
                incomingOfferData = data;
                incomingCaller = data.from;
                document.getElementById('caller-name').textContent = incomingCaller;
                document.getElementById('incoming-call-modal').classList.remove('hidden');
            } else if (data.type === 'answer') {
                await handleAnswer(data);
            } else if (data.type === 'ice-candidate') {
                await handleIceCandidate(data);
            } else if (data.type === 'screen-offer') {
                // Other side wants to share screen — handle like a new negotiation
                await handleScreenOffer(data);
            } else if (data.type === 'screen-answer') {
                await handleScreenAnswer(data);
            } else if (data.type === 'screen-ice') {
                await handleScreenIce(data);
            } else if (data.type === 'screen-stop') {
                closeRemoteVideo();
            }
        };
    }

    function sendViaSocket(payload) {
        if (socket && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify(payload));
        }
    }

    // ==================== UI HELPERS ====================
    function renderOnlineList(users) {
        const container = document.getElementById('online-list');
        container.innerHTML = '';
        const others = users.filter(u => u !== myUsername);
        if (others.length === 0) {
            container.innerHTML = `<div class="text-zinc-400 text-center py-8">Пока никого нет 😔<br>Поделись ссылкой!</div>`;
            return;
        }
        others.forEach(user => {
            const div = document.createElement('div');
            div.className = `flex items-center gap-x-3 px-4 py-3 rounded-3xl hover:bg-zinc-800 cursor-pointer ${currentChatUser === user ? 'bg-cyan-400/10' : ''}`;
            div.innerHTML = `
                <div class="w-8 h-8 bg-gradient-to-br from-cyan-300 to-blue-500 rounded-2xl flex items-center justify-center text-xl">👤</div>
                <div class="flex-1">
                    <div class="font-medium">${user}</div>
                    <div class="text-emerald-400 text-xs">онлайн</div>
                </div>`;
            div.onclick = () => selectUser(user);
            container.appendChild(div);
        });
    }

    function selectUser(username) {
        currentChatUser = username;
        document.getElementById('empty-state').classList.add('hidden');
        document.getElementById('chat-header').classList.remove('hidden');
        document.getElementById('message-input-area').classList.remove('hidden');
        document.getElementById('chat-with-name').textContent = username;
        document.getElementById('chat-area').innerHTML = '';
    }

    async function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        if (!text || !currentChatUser) return;
        addMessageToUI(myUsername, text, true);
        sendViaSocket({ type: 'chat', to: currentChatUser, message: text });
        input.value = '';
    }

    function addMessageToUI(from, text, isSelf) {
        const area = document.getElementById('chat-area');
        const bubble = document.createElement('div');
        bubble.className = `flex ${isSelf ? 'justify-end' : 'justify-start'}`;
        bubble.innerHTML = `<div class="chat-bubble ${isSelf ? 'chat-bubble-self' : 'chat-bubble-other'}">${text}</div>`;
        area.appendChild(bubble);
        area.scrollTop = area.scrollHeight;
    }

    // ==================== WEBRTC CALL ====================
    function createPeerConnection(targetUser) {
        const pc = new RTCPeerConnection(config);

        pc.ontrack = (event) => {
            const track = event.track;
            if (track.kind === 'audio') {
                if (!remoteAudioEl.srcObject || remoteAudioEl.srcObject.getAudioTracks().length === 0) {
                    remoteAudioEl.srcObject = event.streams[0];
                    remoteAudioEl.play().catch(() => {});
                }
            } else if (track.kind === 'video') {
                // Incoming screen share!
                remoteVideoEl.srcObject = event.streams[0];
                remoteVideoEl.play().catch(() => {});
                document.getElementById('remote-video-container').classList.add('active');
                addMessageToUI('Система', `🖥️ ${targetUser || incomingCaller} начал показывать экран`, false);
            }
        };

        pc.onicecandidate = (event) => {
            if (event.candidate) {
                sendViaSocket({ type: 'ice-candidate', to: targetUser || incomingCaller, candidate: event.candidate });
            }
        };

        pc.onconnectionstatechange = () => {
            if (['disconnected', 'failed', 'closed'].includes(pc.connectionState)) {
                endCall();
            }
        };

        return pc;
    }

    async function startAudioCall() {
        if (!currentChatUser) return;
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            peerConnection = createPeerConnection(currentChatUser);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            sendViaSocket({ type: 'offer', to: currentChatUser, offer });

            showActiveCallOverlay(currentChatUser);
            document.getElementById('end-call-btn').classList.remove('hidden');
        } catch (err) {
            alert('Ошибка микрофона: ' + err.message);
        }
    }

    async function acceptCall() {
        document.getElementById('incoming-call-modal').classList.add('hidden');
        if (!incomingOfferData) return;
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            peerConnection = createPeerConnection(incomingCaller);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            await peerConnection.setRemoteDescription(new RTCSessionDescription(incomingOfferData.offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            sendViaSocket({ type: 'answer', to: incomingCaller, answer });

            currentChatUser = incomingCaller;
            showActiveCallOverlay(incomingCaller);
            selectUser(incomingCaller);
            document.getElementById('end-call-btn').classList.remove('hidden');
        } catch (err) {
            console.error(err);
        }
    }

    function declineCall() {
        document.getElementById('incoming-call-modal').classList.add('hidden');
        if (incomingCaller) sendViaSocket({ type: 'decline', to: incomingCaller });
        incomingCaller = null;
    }

    async function handleAnswer(data) {
        if (peerConnection && peerConnection.signalingState !== 'stable') {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
        }
    }

    async function handleIceCandidate(data) {
        if (peerConnection && data.candidate) {
            try { await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate)); } catch (e) {}
        }
    }

    function endCall() {
        stopScreenShare();
        if (peerConnection) { peerConnection.close(); peerConnection = null; }
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
        if (remoteAudioEl) remoteAudioEl.srcObject = null;
        document.getElementById('active-call-overlay').classList.add('hidden');
        document.getElementById('end-call-btn').classList.add('hidden');
        closeRemoteVideo();
    }

    function showActiveCallOverlay(withUser) {
        document.getElementById('call-with-name').textContent = withUser;
        document.getElementById('active-call-overlay').classList.remove('hidden');
    }

    // ==================== SCREEN SHARE ====================
    async function startScreenShare() {
        if (!currentChatUser) { alert('Сначала выбери собеседника!'); return; }

        try {
            // Capture screen (with system audio if browser supports it)
            localScreenStream = await navigator.mediaDevices.getDisplayMedia({
                video: {
                    frameRate: { ideal: 30, max: 60 },
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                },
                audio: {
                    echoCancellation: false,
                    noiseSuppression: false,
                    sampleRate: 44100
                }
            });

            // Show local preview
            const localPreview = document.getElementById('local-screen-video');
            localPreview.srcObject = localScreenStream;
            document.getElementById('local-screen-preview').classList.add('active');

            // If no active call — create a new PeerConnection just for screen share
            if (!peerConnection) {
                peerConnection = createPeerConnection(currentChatUser);
            }

            // Add screen video (and possibly system audio) tracks
            localScreenStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localScreenStream);
            });

            // Re-negotiate (renegotiation needed for adding tracks mid-call)
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            sendViaSocket({ type: 'offer', to: currentChatUser, offer });

            // Handle when user stops via browser's built-in "Stop sharing" button
            localScreenStream.getVideoTracks()[0].onended = () => {
                stopScreenShare();
            };

            document.getElementById('screen-share-btn').classList.add('hidden');
            document.getElementById('stop-screen-btn').classList.remove('hidden');
            document.getElementById('end-call-btn').classList.remove('hidden');
            showActiveCallOverlay(currentChatUser);

            addMessageToUI('Система', '🖥️ Вы начали демонстрацию экрана', true);

        } catch (err) {
            if (err.name !== 'NotAllowedError') {
                alert('Ошибка захвата экрана: ' + err.message);
            }
        }
    }

    function stopScreenShare() {
        if (!localScreenStream) return;

        localScreenStream.getTracks().forEach(t => {
            t.stop();
            // Remove track from peer connection
            if (peerConnection) {
                const sender = peerConnection.getSenders().find(s => s.track === t);
                if (sender) peerConnection.removeTrack(sender);
            }
        });
        localScreenStream = null;

        const localPreview = document.getElementById('local-screen-video');
        localPreview.srcObject = null;
        document.getElementById('local-screen-preview').classList.remove('active');

        document.getElementById('screen-share-btn').classList.remove('hidden');
        document.getElementById('stop-screen-btn').classList.add('hidden');

        sendViaSocket({ type: 'screen-stop', to: currentChatUser });
        addMessageToUI('Система', '⏹ Вы остановили демонстрацию экрана', true);
    }

    // Receiving renegotiated offer (e.g. when other side starts screen share)
    async function handleScreenOffer(data) {
        // This is now handled inside the main 'offer' handler —
        // since we reuse the main peerConnection flow.
    }
    async function handleScreenAnswer(data) {}
    async function handleScreenIce(data) {}

    function closeRemoteVideo() {
        const container = document.getElementById('remote-video-container');
        const vid = document.getElementById('remote-video');
        vid.srcObject = null;
        container.classList.remove('active');
    }

    // ==================== MISC ====================
    function copyShareLink() {
        const link = `${window.location.origin}?join=${myUsername}`;
        navigator.clipboard.writeText(link).then(() => alert('✅ Ссылка скопирована!'));
    }

    function logout() {
        if (socket) socket.close();
        location.reload();
    }

    function initApp() {
        remoteAudioEl = document.getElementById('remote-audio');
        remoteVideoEl = document.getElementById('remote-video');
        remoteAudioEl.volume = 1.0;

        const name = prompt('Как тебя зовут в чате?', 'Ты');
        if (!name || !name.trim()) return;
        myUsername = name.trim();

        connectWebSocket(myUsername);
    }

    window.onload = initApp;
</script>

</body>
</html>
